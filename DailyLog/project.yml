name: DailyLog
options:
  bundleIdPrefix: com.wangjinlong
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"

targets:
  DailyLog:
    type: application
    platform: iOS
    sources:
      - DailyLog
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "完成任务时需要拍照作为打卡凭证"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "完成任务时需要从相册选择照片作为打卡凭证"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjinlong.DailyLog
    dependencies:
      - package: supabase-swift
        product: Supabase
